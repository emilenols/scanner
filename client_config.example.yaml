# client_config.example.yaml — TEMPLATE (safe to commit; contains no real data)
#
# The operator copies this to client_config.yaml in their OWN Cloud Shell and
# fills every value — see ALEX_walkthrough.md, Part 2. It is never committed:
# the .gitignore keeps client_config.yaml out of git automatically.
#
# Three fields are advisory (a wrong value bites): routing.model (confirm with
# list_models.py), the routing thresholds (leave defaults), and
# gdpr.pass2_legal_basis_ref (leave null). Everything else is the operator's call.

client: "<Client legal name>"
engagement_ref: "<FFC-XX-YYYY>"
operator: "<who is running this scan>"

gcp:
  project_id: "<client-data-lake>"        # also used by setup.sh (read automatically)
  region: "europe-west1"                  # keep EU for GDPR
  bucket: "<client-document-catalog-eu>"  # must be globally unique
  service_account: "scanner-sa"

drive:
  source_folder: "<exact mirror folder name in your Drive>"

taxonomy:
  system_context: "<one line describing the business>"   # fill this now
  document_types:                          # leave as just [Unknown] for now —
    - "Unknown"                            # discover_taxonomy.py proposes the
                                           # real list (walkthrough Part 5.3 = Gate A)
  languages: ["nl", "fr", "en", "mixed", "unknown"]

routing:
  model: "gemini-2.5-flash-lite"          # advisory — confirm with list_models.py; 3.1-flash-lite is the upgrade
  accept_threshold: 0.85                  # leave default (changing is a methodology call)
  review_threshold: 0.70                  # leave default
  fallback_model: "gemini-2.5-pro"

gdpr:
  pass1_legal_basis: "type-only classification, no PII persisted — no basis required"
  pass2_legal_basis_ref: null             # LEAVE NULL — blocks Pass 2 in code until a legal basis is signed off

gates:
  gate_a_approver: { name: "<who signs off the taxonomy>", role: "<role>" }
  gate_b_approver: { name: "<who runs the pilot review>", role: "<role>" }
